<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found (404) - Little Creators Shop</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-bg: #f9f6f0;
            --color-primary: #8c6239;
            --color-primary-hover: #6e4c2b;
            --color-dark: #221a15;
            --color-border: #e6dfd5;
        }
        body {
            background-color: var(--color-bg);
            color: var(--color-dark);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            background: #ffffff;
            border: 1px solid var(--color-border);
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(34, 26, 21, 0.04);
            padding: 3.5rem 2.5rem;
            max-width: 600px;
            width: 90%;
            text-align: center;
        }
        .error-icon {
            font-size: 4.5rem;
            color: var(--color-primary);
            margin-bottom: 1.5rem;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }
        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
            font-size: 2.2rem;
            margin-bottom: 1rem;
        }
        .lead-text {
            font-size: 1.1rem;
            color: #6c757d;
            margin-bottom: 2rem;
        }
        .btn-crafts {
            background-color: var(--color-primary);
            color: #ffffff;
            font-weight: 500;
            padding: 0.75rem 1.75rem;
            border-radius: 8px;
            border: none;
            transition: all 0.2s ease-in-out;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-crafts:hover {
            background-color: var(--color-primary-hover);
            color: #ffffff;
            transform: translateY(-1px);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .divider {
            height: 1px;
            background-color: var(--color-border);
            margin: 1.5rem 0;
        }
        .arabic-text {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            direction: rtl;
        }
    </style>
</head>
<body>

    <div class="error-card">
        <div class="error-icon">
            <i class="bi bi-compass"></i>
        </div>
        
        <!-- English Section -->
        <div>
            <h1>Page Not Found</h1>
            <p class="lead-text">We can't seem to find the page you are looking for. It might have been moved or deleted.</p>
        </div>
        
        <div class="divider"></div>
        
        <!-- Arabic Section -->
        <div class="arabic-text">
            <h1 class="fs-3 mb-2">الصفحة غير موجودة</h1>
            <p class="lead-text fs-6 mb-3">عذرًا، لم نتمكن من العثور على الصفحة التي تبحث عنها. قد تكون قد نُقلت أو حُذفت.</p>
        </div>

        <div class="mt-4">
            <a href="/" class="btn btn-crafts">
                <i class="bi bi-house-door-fill"></i>
                Back to Home / العودة للرئيسية
            </a>
        </div>
    </div>

</body>
</html>
