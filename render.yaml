services:
  - type: web
    name: crafts-project
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: mkdir -p media/products media/screenshots && cp -rn media_backup/* media/ 2>/dev/null || true && gunicorn crafts_project.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
    disk:
      name: crafts-media
      mountPath: /opt/render/project/src/media
      sizeGB: 1

